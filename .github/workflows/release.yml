name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Android APK ──
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/omniverse-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=omniverse-release.jks\n' \
            "$STORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB (Play Store用)
        run: flutter build appbundle --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk "OmniVerse-v${{ steps.version.outputs.version }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "OmniVerse-v${{ steps.version.outputs.version }}.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: |
            OmniVerse-v${{ steps.version.outputs.version }}.apk
            OmniVerse-v${{ steps.version.outputs.version }}.aab

  # ── iOS IPA ──
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Import signing certificate
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # Keychain作成
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 証明書インポート
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: env.IOS_PROVISIONING_PROFILE_BASE64 != ''
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (no codesign)
        if: env.IOS_CERTIFICATE_BASE64 == ''
        run: flutter build ios --release --no-codesign

      - name: Build iOS (signed)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          flutter build ios --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Create IPA
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "OmniVerse-v${VERSION}.ipa" Payload
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: ipa

      - name: Install App Store provisioning profile
        if: env.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 != ''
        env:
          IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/appstore.mobileprovision
          echo "$IOS_APPSTORE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build App Store IPA
        if: env.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 != ''
        env:
          IOS_APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Diagnostic: show available signing identities
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning || true
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

          # flutter build ipa requires a Development cert (which we don't have),
          # so call xcodebuild directly with manual signing using the Distribution cert.
          ARCHIVE_PATH=$RUNNER_TEMP/Runner.xcarchive
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=M5D5CQRGX8 \
            PROVISIONING_PROFILE_SPECIFIER="OmniVerse AppStore"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions-AppStore.plist

          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          IPA_SRC=$(ls build/ios/ipa/*.ipa | head -1)
          cp "$IPA_SRC" "OmniVerse-v${VERSION}-AppStore.ipa"

      - name: Upload to App Store Connect
        if: env.APPSTORE_API_KEY_ID != ''
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          IPA=$(ls OmniVerse-v*-AppStore.ipa | head -1)
          echo "Uploading $IPA to App Store Connect..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Upload IPA artifact
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v5
        with:
          name: ios-ipa
          path: "OmniVerse-v*.ipa"

  # ── Release作成 ──
  release:
    needs: [build-android, build-ios]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/android-apk/*.aab
            artifacts/ios-ipa/*.ipa
          generate_release_notes: true
          fail_on_unmatched_files: false
